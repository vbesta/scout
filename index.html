<!DOCTYPE html>

<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VBesta Scout</title>
<style>
body{margin:0;padding:0;background:#111;color:#eee;font-family:Arial,sans-serif;font-size:15px;}
h1{color:#c9a84c;margin:0;}
.top{background:#1a1916;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #c9a84c;}
.tabs{display:flex;background:#1a1916;border-bottom:1px solid #333;}
.tab{flex:1;padding:14px;text-align:center;cursor:pointer;color:#888;font-size:13px;font-weight:bold;border:none;background:none;}
.tab:hover{color:#c9a84c;}
.tab.on{color:#c9a84c;border-bottom:2px solid #c9a84c;}
.page{display:none;padding:20px;}
.page.on{display:block;}
.card{background:#1a1916;border:1px solid #333;border-radius:8px;padding:14px;margin-bottom:10px;cursor:pointer;}
.card:hover{border-color:#c9a84c;}
.card h3{margin:0 0 6px;color:#fff;}
.card p{margin:3px 0;color:#888;font-size:13px;}
.badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:bold;margin-right:5px;}
.b-new{background:#1a3a5c;color:#6a9fd8;}
.b-talks{background:#3a3000;color:#e8c84a;}
.b-signed{background:#0a3020;color:#4caf7d;}
.b-placed{background:#3a2800;color:#c9a84c;}
.b-casting{background:#2a1a3a;color:#a07ac8;}
.b-inactive{background:#222;color:#666;}
input,select,textarea{width:100%;padding:10px;margin:5px 0 12px;background:#222;border:1px solid #444;color:#eee;border-radius:6px;font-size:14px;box-sizing:border-box;}
input:focus,select:focus,textarea:focus{border-color:#c9a84c;outline:none;}
label{display:block;color:#999;font-size:12px;text-transform:uppercase;letter-spacing:1px;margin-top:8px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.btn{padding:12px 20px;border:none;border-radius:7px;font-size:14px;font-weight:bold;cursor:pointer;width:100%;margin-top:8px;}
.btn-gold{background:#c9a84c;color:#000;}
.btn-gold:hover{background:#e8c97a;}
.btn-grey{background:#333;color:#aaa;border:1px solid #444;}
.btn-red{background:#3a0000;color:#e06060;border:1px solid #5a0000;}
.form-box{background:#1a1916;border:1px solid #333;border-radius:10px;padding:20px;margin-bottom:16px;}
.form-box h2{color:#c9a84c;margin:0 0 16px;font-size:18px;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.stat{background:#1a1916;border-left:3px solid #c9a84c;border-radius:8px;padding:14px;}
.stat.g{border-color:#4caf7d;}
.stat.b{border-color:#6a9fd8;}
.stat.p{border-color:#a07ac8;}
.stat-n{font-size:30px;font-weight:bold;color:#fff;}
.stat-l{font-size:11px;color:#888;text-transform:uppercase;}
.sync{font-size:12px;color:#666;}
.sync.ok{color:#4caf7d;}
.sync.err{color:#e06060;}
.detail-box{background:#1a1916;border:1px solid #333;border-radius:10px;padding:16px;margin-bottom:12px;}
.detail-box h2{color:#fff;margin:0 0 12px;}
.info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #2a2a2a;font-size:14px;}
.info-row:last-child{border:none;}
.info-key{color:#666;}
.info-val{color:#eee;text-align:right;}
.info-val a{color:#c9a84c;}
.video-item{background:#222;border:1px solid #333;border-radius:6px;padding:10px;margin-bottom:8px;display:flex;align-items:center;gap:10px;}
.video-item a{color:#c9a84c;text-decoration:none;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.vdel{background:none;border:none;color:#666;cursor:pointer;font-size:16px;}
.vembed{width:100%;aspect-ratio:16/9;border:none;border-radius:8px;margin-bottom:8px;}
textarea.notes{height:100px;}
.back{color:#c9a84c;cursor:pointer;margin-bottom:16px;display:inline-block;font-size:14px;}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.fb{padding:5px 12px;border-radius:20px;border:1px solid #333;background:transparent;color:#888;cursor:pointer;font-size:12px;}
.fb.on{border-color:#c9a84c;color:#c9a84c;background:rgba(201,168,76,.1);}
.empty{text-align:center;padding:40px;color:#555;}
.activity-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #222;}
.activity-item:last-child{border:none;}
.adot{width:8px;height:8px;border-radius:50%;margin-top:4px;flex-shrink:0;}
</style>
</head>
<body>

<div class="top">
<h1>VBesta Scout</h1>
<span class="sync" id="sync-status">Připojování...</span>
</div>

<div class="tabs">
<button class="tab on" onclick="showTab('dash')">◈ Přehled</button>
<button class="tab" onclick="showTab('players')">👤 Hráči</button>
<button class="tab" onclick="showTab('inbox')">✉ Poptávky</button>
<button class="tab" onclick="showTab('notes')">✎ Poznámky</button>
</div>

<!-- DASHBOARD -->

<div class="page on" id="tab-dash">
<div class="stat-grid">
<div class="stat"><div class="stat-n" id="st0">0</div><div class="stat-l">Hráčů celkem</div></div>
<div class="stat g"><div class="stat-n" id="st1">0</div><div class="stat-l">Aktivní</div></div>
<div class="stat b"><div class="stat-n" id="st2">0</div><div class="stat-l">Poptávky</div></div>
<div class="stat p"><div class="stat-n" id="st3">0</div><div class="stat-l">Casting</div></div>
</div>
<div class="form-box">
<h2>Pipeline přehled</h2>
<div id="dash-pipeline">Zatím žádní hráči</div>
</div>
<div class="form-box">
<h2>Poslední aktivita</h2>
<div id="dash-activity">Zatím žádná aktivita</div>
</div>
<button class="btn btn-grey" onclick="exportCSV()">⬇ Export do CSV</button>
</div>

<!-- HRÁČI -->

<div class="page" id="tab-players">
<div class="form-box" id="form-player" style="display:none">
<h2 id="form-player-title">+ Přidat hráče</h2>
<label>Jméno a příjmení *</label>
<input id="p-name" placeholder="Jan Novák">
<div class="row2">
<div><label>Věk</label><input id="p-age" type="number" placeholder="22"></div>
<div><label>Pozice</label>
<select id="p-pos"><option>Brankář</option><option>Obránce</option><option selected>Záložník</option><option>Útočník</option><option>Jiné</option></select>
</div>
</div>
<label>Status</label>
<select id="p-status">
<option value="new">Nový kontakt</option>
<option value="talks">Rozjednáno</option>
<option value="signed">Podepsáno</option>
<option value="casting">Casting</option>
<option value="placed">Udáno</option>
<option value="inactive">Neodbaveno</option>
</select>
<div class="row2">
<div><label>Aktuální tým</label><input id="p-team" placeholder="FK Příklad"></div>
<div><label>Soutěž / Liga</label><input id="p-league" placeholder="Krajský přebor"></div>
</div>
<div class="row2">
<div><label>Město</label><input id="p-city" placeholder="Praha"></div>
<div><label>Telefon</label><input id="p-phone" placeholder="+420..."></div>
</div>
<div class="row2">
<div><label>Instagram</label><input id="p-ig" placeholder="@handle"></div>
<div><label>Národnost</label><input id="p-nat" placeholder="CZ"></div>
</div>
<div class="row2">
<div><label>Výška (cm)</label><input id="p-height" type="number" placeholder="180"></div>
<div><label>Dom. noha</label><select id="p-foot"><option value="">—</option><option>Pravá</option><option>Levá</option><option>Obounohý</option></select></div>
</div>
<label>Cílový klub / liga</label>
<input id="p-target" placeholder="Kreisliga Bayern...">
<label>Poznámka</label>
<textarea id="p-note" placeholder="Zkušenosti, silné stránky..."></textarea>
<button class="btn btn-gold" id="player-save-btn" onclick="savePlayer()">Uložit hráče</button>
<button class="btn btn-grey" onclick="hidePlayerForm()" style="margin-top:6px">Zrušit</button>
</div>

<button class="btn btn-gold" onclick="showPlayerForm()" id="add-player-btn">+ Přidat hráče</button>

<div class="filter-row" id="filter-row">
<button class="fb on" onclick="setFilter('all',this)">Vše</button>
<button class="fb" onclick="setFilter('new',this)">Nový</button>
<button class="fb" onclick="setFilter('talks',this)">Rozjednáno</button>
<button class="fb" onclick="setFilter('signed',this)">Podepsáno</button>
<button class="fb" onclick="setFilter('casting',this)">Casting</button>
<button class="fb" onclick="setFilter('placed',this)">Udáno</button>
<button class="fb" onclick="setFilter('inactive',this)">Neodbaveno</button>
</div>

<div id="players-list"></div>
</div>

<!-- DETAIL -->

<div class="page" id="tab-detail">
<div id="detail-content"></div>
</div>

<!-- INBOX -->

<div class="page" id="tab-inbox">
<div class="form-box" id="form-inq" style="display:none">
<h2>+ Přidat poptávku</h2>
<div class="row2">
<div><label>Jméno *</label><input id="i-name" placeholder="Tomáš Svoboda"></div>
<div><label>Platforma</label><select id="i-plat"><option>Instagram</option><option>TikTok</option><option>Email</option><option>WhatsApp</option><option>Jiné</option></select></div>
</div>
<label>Zpráva</label>
<textarea id="i-msg" placeholder="Co nám napsal/a..."></textarea>
<div class="row2">
<div><label>Kontakt</label><input id="i-contact" placeholder="@handle nebo email"></div>
<div><label>Priorita</label><select id="i-prio"><option>Normální</option><option>Vysoká</option><option>Nízká</option></select></div>
</div>
<button class="btn btn-gold" onclick="saveInq()">Uložit poptávku</button>
<button class="btn btn-grey" onclick="document.getElementById('form-inq').style.display='none'" style="margin-top:6px">Zrušit</button>
</div>
<button class="btn btn-gold" onclick="document.getElementById('form-inq').style.display='block'">+ Přidat poptávku</button>
<div id="inbox-list" style="margin-top:14px"></div>
</div>

<!-- NOTES -->

<div class="page" id="tab-notes">
<div class="form-box" id="form-note" style="display:none">
<h2>+ Přidat poznámku</h2>
<label>Nadpis</label><input id="n-title" placeholder="Název...">
<label>Text</label><textarea id="n-text" class="notes"></textarea>
<label>Autor</label><select id="n-auth"><option>Vojtěch</option><option>Kolega</option></select>
<button class="btn btn-gold" onclick="saveNote()">Uložit poznámku</button>
<button class="btn btn-grey" onclick="document.getElementById('form-note').style.display='none'" style="margin-top:6px">Zrušit</button>
</div>
<button class="btn btn-gold" onclick="document.getElementById('form-note').style.display='block'">+ Přidat poznámku</button>
<div id="notes-list" style="margin-top:14px"></div>
</div>

<script>
var BIN = '69cd63b436566621a86ddb64';
var MKEY = '$2a$10$VdMx.HilPtQKvGTs7C047.c6sZ7jsgm/q.LIls.q/peTXN4Vdlb3W';
var DB = {talents:[],inquiries:[],notes:[],activities:[]};
var currentFilter = 'all';
var prevTab = 'players';
var editId = null;
var saving = false;

var ST = {
new: {l:'Nový kontakt', c:'b-new', col:'#6a9fd8'},
talks: {l:'Rozjednáno', c:'b-talks', col:'#e8c84a'},
signed: {l:'Podepsáno', c:'b-signed', col:'#4caf7d'},
placed: {l:'Udáno', c:'b-placed', col:'#c9a84c'},
casting: {l:'Casting', c:'b-casting', col:'#a07ac8'},
inactive:{l:'Neodbaveno', c:'b-inactive',col:'#5a5850'}
};

function ini(n){
return (n||'?').split(' ').map(function(w){return w[0]||'';}).join('').substring(0,2).toUpperCase();
}
function fd(iso){
if(!iso) return '—';
return new Date(iso).toLocaleDateString('cs');
}
function badge(s){
var t = ST[s]||ST.new;
return '<span class="badge '+t.c+'">'+t.l+'</span>';
}
function lsSave(){
try{localStorage.setItem('vbdb',JSON.stringify(DB));}catch(e){}
}
function lsLoad(){
try{
var d = JSON.parse(localStorage.getItem('vbdb')||'{}');
DB.talents = d.talents || [];
DB.inquiries = d.inquiries || [];
DB.notes = d.notes || [];
DB.activities = d.activities || [];
}catch(e){}
}
function logA(txt,col){
DB.activities.unshift({txt:txt,col:col,t:new Date().toLocaleString('cs')});
if(DB.activities.length>40) DB.activities.pop();
}
function setSS(msg,cls){
var el = document.getElementById('sync-status');
el.textContent = msg;
el.className = 'sync '+(cls||'');
}

// CLOUD
function loadCloud(){
setSS('Načítám...','');
fetch('https://api.jsonbin.io/v3/b/'+BIN+'/latest',{
headers:{'X-Master-Key':MKEY,'X-Bin-Meta':'false'}
}).then(function(r){
if(!r.ok) throw new Error(r.status);
return r.json();
}).then(function(d){
DB.talents = d.talents || [];
DB.inquiries = d.inquiries || [];
DB.notes = d.notes || [];
DB.activities = d.activities || [];
setSS('● Synchronizováno','ok');
lsSave(); renderAll();
}).catch(function(){
setSS('● Offline - lokálně','err');
lsLoad(); renderAll();
});
}

function saveCloud(){
if(saving) return;
saving = true;
setSS('Ukládám...','');
lsSave();
fetch('https://api.jsonbin.io/v3/b/'+BIN,{
method:'PUT',
headers:{'Content-Type':'application/json','X-Master-Key':MKEY},
body:JSON.stringify(DB)
}).then(function(r){
if(!r.ok) throw new Error(r.status);
setSS('● Uloženo','ok');
setTimeout(function(){setSS('● Synchronizováno','ok');},2000);
}).catch(function(){
setSS('● Lokálně uloženo','err');
}).then(function(){saving=false;});
}

// TABS
function showTab(id){
if(id !== 'detail') prevTab = id;
document.querySelectorAll('.page').forEach(function(p){p.classList.remove('on');});
document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
document.getElementById('tab-'+id).classList.add('on');
var tabs = ['dash','players','inbox','notes'];
var idx = tabs.indexOf(id);
if(idx >= 0) document.querySelectorAll('.tab')[idx].classList.add('on');
if(id==='dash') renderDash();
if(id==='players') renderPlayers();
if(id==='inbox') renderInbox();
if(id==='notes') renderNotes();
}

// PLAYER FORM
function showPlayerForm(){
editId = null;
document.getElementById('form-player-title').textContent = '+ Přidat hráče';
document.getElementById('player-save-btn').textContent = 'Uložit hráče';
document.getElementById('form-player').style.display = 'block';
document.getElementById('add-player-btn').style.display = 'none';
window.scrollTo(0,0);
}
function hidePlayerForm(){
document.getElementById('form-player').style.display = 'none';
document.getElementById('add-player-btn').style.display = 'block';
clearPlayerForm();
editId = null;
}
function clearPlayerForm(){
['p-name','p-age','p-team','p-league','p-city','p-phone','p-ig','p-nat','p-height','p-target','p-note'].forEach(function(id){
var el = document.getElementById(id);
if(el) el.value = '';
});
document.getElementById('p-status').value = 'new';
document.getElementById('p-foot').value = '';
}
function getForm(){
return {
name: document.getElementById('p-name').value.trim(),
age: document.getElementById('p-age').value,
pos: document.getElementById('p-pos').value,
status: document.getElementById('p-status').value,
team: document.getElementById('p-team').value.trim(),
league: document.getElementById('p-league').value.trim(),
city: document.getElementById('p-city').value.trim(),
phone: document.getElementById('p-phone').value.trim(),
ig: document.getElementById('p-ig').value.trim(),
nat: document.getElementById('p-nat').value.trim(),
height: document.getElementById('p-height').value,
foot: document.getElementById('p-foot').value,
target: document.getElementById('p-target').value.trim(),
note: document.getElementById('p-note').value.trim()
};
}

function savePlayer(){
var d = getForm();
if(!d.name){alert('Vyplňte jméno hráče!');return;}
if(editId){
var t = DB.talents.filter(function(x){return x.id===editId;})[0];
if(t){
Object.assign(t,d);
logA('<strong>'+t.name+'</strong> aktualizován','#c9a84c');
}
} else {
var nt = {id:Date.now(),videos:[],email:'',added:new Date().toISOString()};
Object.assign(nt,d);
DB.talents.unshift(nt);
logA('<strong>'+d.name+'</strong> přidán jako nový hráč',ST[d.status].col);
}
hidePlayerForm();
renderAll();
saveCloud();
}

function openEdit(id){
var t = DB.talents.filter(function(x){return x.id===id;})[0];
if(!t) return;
editId = id;
document.getElementById('form-player-title').textContent = '✏ Upravit hráče';
document.getElementById('player-save-btn').textContent = 'Uložit změny';
var map = {'p-name':t.name,'p-age':t.age||'','p-team':t.team||'','p-league':t.league||'',
'p-city':t.city||'','p-phone':t.phone||'','p-ig':t.ig||'','p-nat':t.nat||'',
'p-height':t.height||'','p-target':t.target||'','p-note':t.note||''};
Object.keys(map).forEach(function(k){
var el = document.getElementById(k);
if(el) el.value = map[k];
});
document.getElementById('p-pos').value = t.pos || 'Záložník';
document.getElementById('p-status').value = t.status || 'new';
document.getElementById('p-foot').value = t.foot || '';
showTab('players');
document.getElementById('form-player').style.display = 'block';
document.getElementById('add-player-btn').style.display = 'none';
window.scrollTo(0,0);
}

function delPlayer(id){
var t = DB.talents.filter(function(x){return x.id===id;})[0];
if(!t||!confirm('Smazat hráče "'+t.name+'"?')) return;
DB.talents = DB.talents.filter(function(x){return x.id!==id;});
logA('<strong>'+t.name+'</strong> smazán','#e06060');
showTab(prevTab);
saveCloud();
}

function updStatus(id,val){
var t = DB.talents.filter(function(x){return x.id===id;})[0];
if(!t) return;
t.status = val;
logA('<strong>'+t.name+'</strong> → '+ST[val].l,ST[val].col);
renderDash();
saveCloud();
}

// DETAIL
function openDetail(id){
var t = DB.talents.filter(function(x){return x.id===id;})[0];
if(!t) return;
showTab('detail');
renderDetail(t);
}

function renderDetail(t){
var st = ST[t.status]||ST.new;
var html = '<span class="back" onclick="showTab(prevTab)">← Zpět</span>';
html += '<div class="detail-box">';
html += '<h2>'+t.name+'</h2>';
html += '<div style="margin-bottom:10px">'+badge(t.status);
if(t.pos) html += ' <span class="badge" style="background:#222;color:#aaa">'+t.pos+'</span>';
if(t.age) html += ' <span class="badge" style="background:#222;color:#aaa">'+t.age+' let</span>';
html += '</div>';
html += '<label>Změnit status</label>';
html += '<select onchange="updStatus('+t.id+',this.value)" style="margin-bottom:12px">';
Object.keys(ST).forEach(function(k){
html += '<option value="'+k+'"'+(t.status===k?' selected':'')+'>'+ST[k].l+'</option>';
});
html += '</select>';
html += '<div style="display:flex;gap:8px">';
html += '<button class="btn btn-grey" style="margin-top:0" onclick="openEdit('+t.id+')">✏ Upravit</button>';
html += '<button class="btn btn-red" style="margin-top:0" onclick="delPlayer('+t.id+')">🗑 Smazat</button>';
html += '</div></div>';

html += '<div class="detail-box"><h2>Základní info</h2>';
html += ir('Tým', t.team||'—')+ir('Soutěž',t.league||'—')+ir('Město',t.city||'—');
html += ir('Věk',t.age||'—')+ir('Výška',t.height?t.height+' cm':'—');
html += ir('Noha',t.foot||'—')+ir('Národnost',t.nat||'—')+ir('Cílový klub',t.target||'—');
html += '</div>';

html += '<div class="detail-box"><h2>Kontakt</h2>';
var igv = t.ig ? '<a href="https://instagram.com/'+t.ig.replace('@','')+'" target="_blank">'+t.ig+'</a>' : '—';
html += ir('Instagram',igv)+ir('Telefon',t.phone||'—')+ir('Přidáno',fd(t.added));
html += '</div>';

html += '<div class="detail-box"><h2>Videa & odkazy</h2>';
html += '<div id="vl-'+t.id+'">'+renderVids(t)+'</div>';
html += '<div style="display:flex;gap:8px;margin-top:8px">';
html += '<input id="vi-'+t.id+'" placeholder="YouTube, Google Drive, Wyscout..." style="margin:0">';
html += '<button class="btn btn-grey" style="margin:0;width:auto;white-space:nowrap" onclick="addVid('+t.id+')">+ Přidat</button>';
html += '</div></div>';

html += '<div class="detail-box"><h2>Poznámky</h2>';
html += '<textarea id="na-'+t.id+'" class="notes" placeholder="Silné/slabé stránky, dojmy...">'+(t.note||'')+'</textarea>';

html += ‘<button class="btn btn-gold" id="ns-'+t.id+'" onclick="saveNotes('+t.id+')">💾 Uložit poznámky</button>’;
html += ‘</div>’;

document.getElementById(‘detail-content’).innerHTML = html;
}

function ir(k,v){
return ‘<div class="info-row"><span class="info-key">’+k+’</span><span class="info-val">’+v+’</span></div>’;
}

function renderVids(t){
if(!t.videos||!t.videos.length) return ‘<p style="color:#555;font-size:13px">Zatím žádná videa</p>’;
return t.videos.map(function(v,i){
var m = v.match(/(?:v=|youtu.be/)([^&?/]+)/);
var e = m ? ‘<iframe class="vembed" src="https://www.youtube.com/embed/'+m[1]+'" allowfullscreen></iframe>’ : ‘’;
return e+’<div class="video-item"><a href="'+v+'" target="_blank">’+v+’</a><button class="vdel" onclick="remVid('+t.id+','+i+')">✕</button></div>’;
}).join(’’);
}

function addVid(id){
var inp = document.getElementById(‘vi-’+id);
var url = (inp.value||’’).trim();
if(!url) return;
var t = DB.talents.filter(function(x){return x.id===id;})[0];
if(!t) return;
if(!t.videos) t.videos = [];
t.videos.push(url);
inp.value = ‘’;
document.getElementById(‘vl-’+id).innerHTML = renderVids(t);
saveCloud();
}

function remVid(id,idx){
var t = DB.talents.filter(function(x){return x.id===id;})[0];
if(!t) return;
t.videos.splice(idx,1);
document.getElementById(‘vl-’+id).innerHTML = renderVids(t);
saveCloud();
}

function saveNotes(id){
var t = DB.talents.filter(function(x){return x.id===id;})[0];
if(!t) return;
t.note = document.getElementById(‘na-’+id).value;
var b = document.getElementById(‘ns-’+id);
if(b){ b.textContent=‘✓ Uloženo!’; setTimeout(function(){b.textContent=‘💾 Uložit poznámky’;},1800); }
saveCloud();
}

// INQUIRY
function saveInq(){
var name = document.getElementById(‘i-name’).value.trim();
if(!name){alert(‘Vyplňte jméno!’);return;}
DB.inquiries.unshift({
id:Date.now(), name:name,
platform: document.getElementById(‘i-plat’).value,
message: document.getElementById(‘i-msg’).value.trim(),
contact: document.getElementById(‘i-contact’).value.trim(),
priority: document.getElementById(‘i-prio’).value,
unread:true, added:new Date().toISOString()
});
logA(‘Nová poptávka od <strong>’+name+’</strong>’,’#6a9fd8’);
document.getElementById(‘form-inq’).style.display=‘none’;
[‘i-name’,‘i-msg’,‘i-contact’].forEach(function(id){document.getElementById(id).value=’’;});
renderInbox(); renderDash(); saveCloud();
}

function convInq(id){
var inq = DB.inquiries.filter(function(x){return x.id===id;})[0];
if(!inq) return;
var t = {id:Date.now(),name:inq.name,age:’’,pos:‘Jiné’,status:‘new’,
team:’’,league:’’,city:’’,nat:’’,ig:inq.contact||’’,phone:’’,
height:’’,foot:’’,target:’’,note:‘Poptávka přes ‘+inq.platform+’: ‘+inq.message,
videos:[],added:new Date().toISOString()};
DB.talents.unshift(t);
DB.inquiries = DB.inquiries.filter(function(x){return x.id!==id;});
logA(’<strong>’+inq.name+’</strong> převeden z poptávky’,’#4caf7d’);
renderDash(); saveCloud(); openDetail(t.id);
}

function delInq(id){
DB.inquiries = DB.inquiries.filter(function(x){return x.id!==id;});
renderInbox(); renderDash(); saveCloud();
}

function markRead(id){
var inq = DB.inquiries.filter(function(x){return x.id===id;})[0];
if(inq){ inq.unread=false; renderInbox(); saveCloud(); }
}

// NOTE
function saveNote(){
var title = document.getElementById(‘n-title’).value.trim();
var text = document.getElementById(‘n-text’).value.trim();
if(!title&&!text) return;
DB.notes.unshift({id:Date.now(),title:title||‘Poznámka’,text:text,
author:document.getElementById(‘n-auth’).value,added:new Date().toISOString()});
document.getElementById(‘form-note’).style.display=‘none’;
document.getElementById(‘n-title’).value=’’;
document.getElementById(‘n-text’).value=’’;
renderNotes(); saveCloud();
}

function delNote(id){
DB.notes = DB.notes.filter(function(x){return x.id!==id;});
renderNotes(); saveCloud();
}

// FILTER
function setFilter(f,btn){
currentFilter = f;
document.querySelectorAll(’.fb’).forEach(function(b){b.classList.remove(‘on’);});
btn.classList.add(‘on’);
renderPlayers();
}

// RENDERS
function renderPlayers(){
var el = document.getElementById(‘players-list’);
if(!el) return;
var list = DB.talents;
if(currentFilter!==‘all’) list = list.filter(function(t){return t.status===currentFilter;});
if(!list.length){el.innerHTML=’<div class="empty">Žádní hráči. Přidej prvního!</div>’;return;}
el.innerHTML = list.map(function(t){
var st = ST[t.status]||ST.new;
return ‘<div class="card" onclick="prevTab=\'players\';openDetail('+t.id+')">’
+’<h3>’+t.name+’</h3>’
+’<p>’+badge(t.status)+(t.pos?’ <span class="badge" style="background:#222;color:#aaa">’+t.pos+’</span>’:’’)+(t.age?’ · ‘+t.age+’ let’:’’)+’</p>’
+(t.team?’<p>⚽ ‘+t.team+(t.league?’ · ‘+t.league:’’)+’</p>’:’’)
+(t.city?’<p>📍 ‘+t.city+’</p>’:’’)
+’</div>’;
}).join(’’);
}

function renderInbox(){
var el = document.getElementById(‘inbox-list’);
if(!el) return;
if(!DB.inquiries.length){el.innerHTML=’<div class="empty">Zatím žádné poptávky</div>’;return;}
el.innerHTML = DB.inquiries.map(function(inq){
return ‘<div class="card" style="cursor:default'+(inq.unread?';border-left:3px solid #c9a84c':'')+'">’
+’<div style="display:flex;justify-content:space-between"><h3>’+inq.name+’</h3><span style="color:#555;font-size:12px">’+fd(inq.added)+’</span></div>’
+’<p>📱 ‘+inq.platform+’ · ‘+(inq.contact||’—’)+’ · ‘+inq.priority+’</p>’
+’<p style="color:#aaa;margin:6px 0">’+(inq.message||’<i>Bez zprávy</i>’)+’</p>’
+’<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">’
+’<button class="btn btn-grey" style="margin:0;width:auto" onclick="convInq('+inq.id+')">➕ Přidat jako hráče</button>’
+(inq.unread?’<button class="btn btn-grey" style="margin:0;width:auto" onclick="markRead('+inq.id+')">✓ Přečteno</button>’:’’)
+’<button class="btn btn-red" style="margin:0;width:auto" onclick="delInq('+inq.id+')">Smazat</button>’
+’</div></div>’;
}).join(’’);
}

function renderNotes(){
var el = document.getElementById(‘notes-list’);
if(!el) return;
if(!DB.notes.length){el.innerHTML=’<div class="empty">Žádné poznámky</div>’;return;}
el.innerHTML = DB.notes.map(function(n){
return ‘<div class="card" style="cursor:default">’
+’<div style="display:flex;justify-content:space-between;align-items:center">’
+’<h3>’+n.title+’</h3>’
+’<button class="btn btn-red" style="margin:0;width:auto;padding:6px 10px" onclick="delNote('+n.id+')">✕</button>’
+’</div>’
+’<p style="color:#666;font-size:12px">’+n.author+’ · ‘+fd(n.added)+’</p>’
+’<p style="color:#aaa;margin-top:8px;white-space:pre-wrap">’+n.text+’</p>’
+’</div>’;
}).join(’’);
}

function renderDash(){
var g = function(id){return document.getElementById(id);};
if(g(‘st0’)) g(‘st0’).textContent = DB.talents.length;
if(g(‘st1’)) g(‘st1’).textContent = DB.talents.filter(function(t){return t.status===‘signed’||t.status===‘placed’;}).length;
if(g(‘st2’)) g(‘st2’).textContent = DB.inquiries.filter(function(i){return i.unread;}).length;
if(g(‘st3’)) g(‘st3’).textContent = DB.talents.filter(function(t){return t.status===‘casting’;}).length;

var ap = g(‘dash-pipeline’);
if(ap){
if(!DB.talents.length){ap.innerHTML=’<p style="color:#555">Zatím žádní hráči</p>’;return;}
var counts = {};
DB.talents.forEach(function(t){counts[t.status]=(counts[t.status]||0)+1;});
ap.innerHTML = Object.keys(counts).map(function(s){
return ‘<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #222">’
+badge(s)+’<strong>’+counts[s]+’</strong></div>’;
}).join(’’);
}

var aa = g(‘dash-activity’);
if(aa){
if(!DB.activities.length){aa.innerHTML=’<p style="color:#555">Zatím žádná aktivita</p>’;return;}
aa.innerHTML = DB.activities.slice(0,8).map(function(a){
return ‘<div class="activity-item">’
+’<div class="adot" style="background:'+a.col+'"></div>’
+’<div><div style="font-size:13px;color:#aaa">’+a.txt+’</div>’
+’<div style="font-size:11px;color:#555">’+a.t+’</div></div>’
+’</div>’;
}).join(’’);
}
}

function renderAll(){
renderDash(); renderPlayers(); renderInbox(); renderNotes();
}

function exportCSV(){
var cols = [‘Jméno’,‘Tým’,‘Soutěž’,‘Status’,‘Věk’,‘Město’,‘Pozice’,‘Instagram’,‘Telefon’,‘Cílový klub’,‘Přidáno’];
var rows = DB.talents.map(function(t){
return [t.name,t.team||’’,t.league||’’,ST[t.status]?ST[t.status].l:t.status,
t.age||’’,t.city||’’,t.pos||’’,t.ig||’’,t.phone||’’,t.target||’’,fd(t.added)
].map(function(v){return ‘”’+String(v).replace(/”/g,’””’)+’”’;}).join(’,’);
});
var csv = ‘\uFEFF’+[cols.join(’,’)].concat(rows).join(’\n’);
var blob = new Blob([csv],{type:‘text/csv;charset=utf-8’});
var url = URL.createObjectURL(blob);
var a = document.createElement(‘a’);
a.href=url; a.download=‘vbesta-hraci.csv’; a.click();
URL.revokeObjectURL(url);
}

setInterval(function(){if(!saving)loadCloud();},20000);
lsLoad(); renderAll(); loadCloud();
